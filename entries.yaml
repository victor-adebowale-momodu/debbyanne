    Lemme check through the organisations.
    Django seems nice. I mean, it is backend + Python.
    Proceeds to check more organisations.
    Stumbles on Konflux CI. Definitely DevOps. I know Python + Docker a bit. 
    Interesting. Only 3 issues. What is the toughest project here? Adding Debian support to Hermeto. And there is RPM. Finally all this OS hopping I have been done would be useful.
    What is Hermeto? Hermetic builds. That is dope. Refers to being sealed off. Okay interesting.
    Checks hermetoproject codebase. Now, that is more like it. 75 issues. Not that many. Reads Contributing.MD. Okay. Let's clone project. No pip command. Means one has to build it.
    What are all these things? nox, requirements-build.txt and yadi yada. Proceeds to experiment with hermeto. Eventually runs it on a Python project. OMG, that is sick. I think this is it.
    
- date: "2026-03-04"
  text: >
    Okay, let's try it on other projects. It says it supports NPM. Proceeds to spin up a quick project and run hermeto.
    For npm, node_modules should not be in the project. But .venv was allowed. Deletes node_modules. See the result.
    Dude, this is really sick. Wait, how do you now point your system to look at these files rather than the usual one?
    Okay, turns out there are environment variables that determine where your project files dependencies would be searched from. That makes sense. 
    But why all these trouble? Bazel has a really cool word. Hermeticity. Same input code gives same output.
    
