      That requires Ubuntu. [action: Downloads Ubuntu.] [action: Flashes to USB using caligula.] [action: Proceeds to install Ubuntu.] Of course, there would be an issue.
      [action: Lemme try again.] Wait, it worked. [ctx: Victor, in the past routinely switched Linux distro every few weeks as he liked to experiment. So, he is used to whatever issues would arise during such endeavours.]

